apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rr-ingress
  namespace: risk-register
  annotations:
    cert-manager.io/cluster-issuer: enterprise-ca   # certificates auto-issued & rotated
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
    - hosts: [risk.biltema-birgma.internal]
      secretName: rr-tls
  rules:
    - host: risk.biltema-birgma.internal
      http:
        paths:
          - { path: /api, pathType: Prefix, backend: { service: { name: api, port: { number: 8080 } } } }
          - { path: /,    pathType: Prefix, backend: { service: { name: web, port: { number: 80 } } } }
