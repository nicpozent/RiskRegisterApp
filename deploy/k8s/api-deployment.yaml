apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: risk-register
spec:
  replicas: 2
  selector: { matchLabels: { app: api } }
  template:
    metadata: { labels: { app: api } }
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: ghcr.io/biltema-birgma/rr-api:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
          envFrom: [{ secretRef: { name: rr-secrets } }]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          livenessProbe:  { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 10 }
          readinessProbe: { httpGet: { path: /readyz,  port: 8080 }, initialDelaySeconds: 5 }
---
apiVersion: v1
kind: Service
metadata: { name: api, namespace: risk-register }
spec:
  selector: { app: api }
  ports: [{ port: 8080, targetPort: 8080 }]
