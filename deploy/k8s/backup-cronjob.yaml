apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-backups
  namespace: risk-register
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: risk-register
spec:
  schedule: "0 2 * * *" # nightly, 02:00 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels: { app: db-backup }
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            seccompProfile: { type: RuntimeDefault }
          containers:
            - name: pg-dump
              image: postgres:16-alpine
              command: ["/bin/sh", "-c"]
              args:
                - pg_dump --format=custom --no-owner --no-privileges
                  --file="/backups/riskregister-$(date -u +%Y%m%dT%H%M%SZ).dump" "$DATABASE_URL"
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef: { name: rr-secrets, key: DATABASE_URL }
                - name: HOME
                  value: /tmp
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: { drop: ["ALL"] }
              resources:
                requests: { cpu: "50m", memory: "64Mi" }
                limits: { cpu: "500m", memory: "256Mi" }
              volumeMounts:
                - { name: backups, mountPath: /backups }
                - { name: tmp, mountPath: /tmp }
          volumes:
            - name: backups
              persistentVolumeClaim: { claimName: db-backups }
            - name: tmp
              emptyDir: {}
