# Optional overlay: run the stack with OpenBao Transit as the encryption KMS.
#
#   docker compose -f docker-compose.yml -f docker-compose.openbao.yml up
#
# DEV MODE ONLY — OpenBao runs in-memory, auto-unsealed, with a throwaway root
# token. Do NOT use this for production data (see docs/security/encryption-at-rest.md
# for the production setup: persistent storage, real unseal, TLS, k8s auth).
services:
  openbao:
    image: openbao/openbao:latest
    command: server -dev -dev-root-token-id=${BAO_TOKEN:-dev-root} -dev-listen-address=0.0.0.0:8200
    environment:
      BAO_ADDR: http://127.0.0.1:8200
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [backend]

  # One-shot: enable the Transit engine and create the encryption key.
  openbao-init:
    image: openbao/openbao:latest
    depends_on:
      openbao: { condition: service_healthy }
    environment:
      BAO_ADDR: http://openbao:8200
      BAO_TOKEN: ${BAO_TOKEN:-dev-root}
    entrypoint: ["/bin/sh", "-c"]
    command: "bao secrets enable transit || true; bao write -f transit/keys/${BAO_TRANSIT_KEY:-risk-register} || true"
    restart: "no"
    networks: [backend]

  # Point the API at OpenBao Transit for at-rest encryption.
  api:
    environment:
      BAO_ADDR: http://openbao:8200
      BAO_TOKEN: ${BAO_TOKEN:-dev-root}
      BAO_TRANSIT_KEY: ${BAO_TRANSIT_KEY:-risk-register}
    depends_on:
      openbao-init: { condition: service_completed_successfully }

  # The worker decrypts recipient addresses, so it needs the same Transit access.
  worker:
    environment:
      BAO_ADDR: http://openbao:8200
      BAO_TOKEN: ${BAO_TOKEN:-dev-root}
      BAO_TRANSIT_KEY: ${BAO_TRANSIT_KEY:-risk-register}
    depends_on:
      openbao-init: { condition: service_completed_successfully }
