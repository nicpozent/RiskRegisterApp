version: 2
updates:
  # npm workspaces (root lockfile covers apps/* and packages/*)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      production-dependencies:
        dependency-type: production
      development-dependencies:
        dependency-type: development

  # GitHub Actions used by the CI workflow
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # Base images in each Dockerfile
  - package-ecosystem: docker
    directory: "/apps/api"
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: "/apps/web"
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: "/apps/worker"
    schedule:
      interval: weekly
